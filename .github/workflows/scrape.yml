name: Scrape Online-Fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout games branch
        uses: actions/checkout@v4
        with:
          ref: games
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ONLINEFIX_USER: ${{ secrets.ONLINEFIX_USER }}
          ONLINEFIX_PASS: ${{ secrets.ONLINEFIX_PASS }}
          PROXY_LIST_URL: ${{ secrets.PROXY_LIST_URL }}
          GITHUB_REPOSITORY: zKauaFerreira/The-Gaming-Rumble
          GITHUB_BRANCH: games
        run: python scrapper.py --workers 6

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add torrents/ online_fix_games.json stats.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: scrape update [$(date +'%Y-%m-%d %H:%M')]"
            git push origin games
          else
            echo "No changes detected."
          fi
