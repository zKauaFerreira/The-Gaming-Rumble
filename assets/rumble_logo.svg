<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131315"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glowing accent dot -->
  <circle cx="130" cy="145" r="8" fill="#a4e6ff" filter="url(#glow)" opacity="0.8"/>

  <!-- ' apostrophe (italic slash) -->
  <path d="M 160 110 Q 180 70 190 75 Q 170 115 160 110 Z" fill="#a4e6ff" filter="url(#glow)" opacity="0.9"/>

  <!-- GR text in italic bold -->
  <text x="175" y="340" font-family="'Courier New', monospace" font-weight="900" font-size="260" fill="#a4e6ff" filter="url(#glow)" transform="translate(0, 8) skewX(-12)">GR</text>
</svg>
